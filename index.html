<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUBO Inventory System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple SVG icon components
        const Search = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        );

        const Package = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M16.5 9.4 7.55 4.24"></path>
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
        );

        const AlertTriangle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        );

        const TrendingDown = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
                <polyline points="17 18 23 18 23 12"></polyline>
            </svg>
        );

        const Plus = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const History = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 3v5h5"></path>
                <path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path>
                <path d="M12 7v5l4 2"></path>
            </svg>
        );

        const Download = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const Upload = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const Trash2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const X = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const generateMockData = () => {
            return [
                { id: 'R001', name: 'AUBO-i5 Robot', category: 'Robots', quantity: 12, minStock: 5, location: 'Warehouse A', lastUpdated: '2026-01-15', notes: 'Gen 2 model' },
                { id: 'R002', name: 'AUBO-i10 Robot', category: 'Robots', quantity: 8, minStock: 3, location: 'Warehouse A', lastUpdated: '2026-01-14', notes: 'Heavy payload' },
                { id: 'R003', name: 'AUBO-i3 Robot', category: 'Robots', quantity: 2, minStock: 5, location: 'Warehouse B', lastUpdated: '2026-01-10', notes: 'Compact model - LOW STOCK' },
                { id: 'CB001', name: 'Control Box - Standard', category: 'Control Boxes', quantity: 15, minStock: 8, location: 'Warehouse A', lastUpdated: '2026-01-16', notes: 'Compatible with i5/i10' },
                { id: 'CB002', name: 'Control Box - Compact', category: 'Control Boxes', quantity: 6, minStock: 4, location: 'Warehouse B', lastUpdated: '2026-01-12', notes: 'For i3 models' },
                { id: 'MB001', name: 'Motherboard v2.1', category: 'Spare Parts', quantity: 25, minStock: 10, location: 'Parts Room A', lastUpdated: '2026-01-17', notes: 'Latest version' },
                { id: 'MB002', name: 'Motherboard v1.8', category: 'Spare Parts', quantity: 8, minStock: 5, location: 'Parts Room A', lastUpdated: '2026-01-11', notes: 'Legacy - for older robots' },
                { id: 'MB003', name: 'Motherboard v2.0', category: 'Spare Parts', quantity: 18, minStock: 10, location: 'Parts Room A', lastUpdated: '2026-01-16', notes: 'Standard version' },
                { id: 'IO001', name: 'I/O Board - 16 Channel', category: 'Spare Parts', quantity: 30, minStock: 15, location: 'Parts Room B', lastUpdated: '2026-01-15', notes: 'Standard I/O' },
                { id: 'IO002', name: 'I/O Board - 32 Channel', category: 'Spare Parts', quantity: 12, minStock: 8, location: 'Parts Room B', lastUpdated: '2026-01-13', notes: 'High-density I/O' },
                { id: 'IF001', name: 'Interface Board Gen1', category: 'Spare Parts', quantity: 4, minStock: 8, location: 'Parts Room C', lastUpdated: '2026-01-09', notes: 'Compatible with v1.x robots - LOW STOCK' },
                { id: 'IF002', name: 'Interface Board Gen2', category: 'Spare Parts', quantity: 22, minStock: 10, location: 'Parts Room C', lastUpdated: '2026-01-17', notes: 'Compatible with v2.x robots' },
                { id: 'IF003', name: 'Interface Board Universal', category: 'Spare Parts', quantity: 15, minStock: 12, location: 'Parts Room C', lastUpdated: '2026-01-16', notes: 'Works with all models' },
                { id: 'RAM001', name: 'RAM 4GB DDR4', category: 'Spare Parts', quantity: 45, minStock: 20, location: 'Parts Room D', lastUpdated: '2026-01-17', notes: 'Standard memory' },
                { id: 'RAM002', name: 'RAM 8GB DDR4', category: 'Spare Parts', quantity: 28, minStock: 15, location: 'Parts Room D', lastUpdated: '2026-01-16', notes: 'High-performance' },
                { id: 'PS001', name: 'Power Supply 24V 10A', category: 'Spare Parts', quantity: 20, minStock: 10, location: 'Parts Room E', lastUpdated: '2026-01-15', notes: 'Standard PSU' },
                { id: 'PS002', name: 'Power Supply 24V 15A', category: 'Spare Parts', quantity: 3, minStock: 6, location: 'Parts Room E', lastUpdated: '2026-01-10', notes: 'Heavy-duty - LOW STOCK' },
                { id: 'CAB001', name: 'Cable Set - Standard', category: 'Spare Parts', quantity: 50, minStock: 25, location: 'Parts Room F', lastUpdated: '2026-01-17', notes: '3m length' },
                { id: 'CAB002', name: 'Cable Set - Extended', category: 'Spare Parts', quantity: 15, minStock: 10, location: 'Parts Room F', lastUpdated: '2026-01-14', notes: '5m length' },
            ];
        };

        const InventorySystem = () => {
            const [inventory, setInventory] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filteredInventory, setFilteredInventory] = useState([]);
            const [selectedCategory, setSelectedCategory] = useState('All');
            const [showLowStock, setShowLowStock] = useState(false);
            const [activityLog, setActivityLog] = useState([]);
            const [showUpdateModal, setShowUpdateModal] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [updateQuantity, setUpdateQuantity] = useState('');
            const [updateAction, setUpdateAction] = useState('received');
            const [updateNotes, setUpdateNotes] = useState('');
            const [importText, setImportText] = useState('');
            const [newItem, setNewItem] = useState({
                id: '', name: '', category: '', quantity: '', minStock: '', location: '', notes: ''
            });

            useEffect(() => {
                const stored = localStorage.getItem('aubo-inventory');
                const storedLog = localStorage.getItem('aubo-activity-log');
                
                if (stored) {
                    setInventory(JSON.parse(stored));
                } else {
                    const mockData = generateMockData();
                    setInventory(mockData);
                    localStorage.setItem('aubo-inventory', JSON.stringify(mockData));
                }

                if (storedLog) {
                    setActivityLog(JSON.parse(storedLog));
                }
            }, []);

            useEffect(() => {
                let results = inventory;

                if (selectedCategory !== 'All') {
                    results = results.filter(item => item.category === selectedCategory);
                }

                if (showLowStock) {
                    results = results.filter(item => item.quantity < item.minStock);
                }

                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    results = results.filter(item => {
                        if (item.id.toLowerCase().includes(term)) return true;
                        if (item.name.toLowerCase().includes(term)) return true;
                        if (item.notes.toLowerCase().includes(term)) return true;
                        
                        const fuzzyTerms = {
                            'motherboard': ['mb', 'mobo', 'mother board'],
                            'interface': ['if', 'interface board'],
                            'io': ['i/o', 'input output'],
                            'control': ['ctrl', 'controller'],
                            'power supply': ['psu', 'ps', 'power'],
                            'cable': ['cab', 'wire', 'wiring'],
                        };

                        for (const [key, variations] of Object.entries(fuzzyTerms)) {
                            if (term === key || variations.includes(term)) {
                                if (item.name.toLowerCase().includes(key)) return true;
                            }
                        }

                        return false;
                    });
                }

                setFilteredInventory(results);
            }, [inventory, searchTerm, selectedCategory, showLowStock]);

            const categories = ['All', ...new Set(inventory.map(item => item.category))];
            const lowStockCount = inventory.filter(item => item.quantity < item.minStock).length;

            const addActivityLog = (action, item, details) => {
                const newLog = {
                    timestamp: new Date().toISOString(),
                    action,
                    itemId: item.id,
                    itemName: item.name,
                    details
                };
                const updatedLog = [newLog, ...activityLog].slice(0, 50);
                setActivityLog(updatedLog);
                localStorage.setItem('aubo-activity-log', JSON.stringify(updatedLog));
            };

            const updateInventoryItem = (itemId, quantityChange, action, notes) => {
                const updatedInventory = inventory.map(item => {
                    if (item.id === itemId) {
                        const newQuantity = item.quantity + quantityChange;
                        return {
                            ...item,
                            quantity: Math.max(0, newQuantity),
                            lastUpdated: new Date().toISOString().split('T')[0]
                        };
                    }
                    return item;
                });

                setInventory(updatedInventory);
                localStorage.setItem('aubo-inventory', JSON.stringify(updatedInventory));

                const item = inventory.find(i => i.id === itemId);
                addActivityLog(action, item, `${quantityChange > 0 ? '+' : ''}${quantityChange} units. ${notes || ''}`);
            };

            const handleUpdateSubmit = () => {
                const change = updateAction === 'received' 
                    ? parseInt(updateQuantity) 
                    : -parseInt(updateQuantity);
                
                updateInventoryItem(selectedItem.id, change, updateAction, updateNotes);
                setShowUpdateModal(false);
                setSelectedItem(null);
                setUpdateQuantity('');
                setUpdateNotes('');
            };

            const handleAddItem = () => {
                if (!newItem.id || !newItem.name || !newItem.category || newItem.quantity === '' || newItem.minStock === '') {
                    alert('Please fill in all required fields (ID, Name, Category, Quantity, Min Stock)');
                    return;
                }

                if (inventory.some(item => item.id === newItem.id)) {
                    alert('Item ID already exists. Please use a unique ID.');
                    return;
                }

                const itemToAdd = {
                    ...newItem,
                    quantity: parseInt(newItem.quantity),
                    minStock: parseInt(newItem.minStock),
                    lastUpdated: new Date().toISOString().split('T')[0]
                };

                const updatedInventory = [...inventory, itemToAdd];
                setInventory(updatedInventory);
                localStorage.setItem('aubo-inventory', JSON.stringify(updatedInventory));

                addActivityLog('added', itemToAdd, `New item added to inventory`);

                setNewItem({ id: '', name: '', category: '', quantity: '', minStock: '', location: '', notes: '' });
                setShowAddModal(false);
            };

            const handleDeleteItem = (item) => {
                if (window.confirm(`Are you sure you want to delete ${item.name} (${item.id})?`)) {
                    const updatedInventory = inventory.filter(i => i.id !== item.id);
                    setInventory(updatedInventory);
                    localStorage.setItem('aubo-inventory', JSON.stringify(updatedInventory));
                    addActivityLog('deleted', item, `Item removed from inventory`);
                }
            };

            const exportData = () => {
                const csv = [
                    ['ID', 'Name', 'Category', 'Quantity', 'Min Stock', 'Location', 'Last Updated', 'Notes'],
                    ...inventory.map(item => [
                        item.id, item.name, item.category, item.quantity, item.minStock, item.location, item.lastUpdated, item.notes
                    ])
                ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `aubo_inventory_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImport = () => {
                try {
                    const lines = importText.trim().split('\n');
                    if (lines.length < 2) {
                        alert('CSV must have at least a header row and one data row');
                        return;
                    }

                    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                    const requiredHeaders = ['ID', 'Name', 'Category', 'Quantity', 'Min Stock'];
                    const missingHeaders = requiredHeaders.filter(h => !headers.includes(h));
                    
                    if (missingHeaders.length > 0) {
                        alert(`Missing required columns: ${missingHeaders.join(', ')}`);
                        return;
                    }

                    const newItems = [];
                    for (let i = 1; i < lines.length; i++) {
                        const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                        const item = {
                            id: values[headers.indexOf('ID')] || '',
                            name: values[headers.indexOf('Name')] || '',
                            category: values[headers.indexOf('Category')] || '',
                            quantity: parseInt(values[headers.indexOf('Quantity')]) || 0,
                            minStock: parseInt(values[headers.indexOf('Min Stock')]) || 0,
                            location: values[headers.indexOf('Location')] || '',
                            lastUpdated: values[headers.indexOf('Last Updated')] || new Date().toISOString().split('T')[0],
                            notes: values[headers.indexOf('Notes')] || ''
                        };

                        if (item.id && item.name) {
                            newItems.push(item);
                        }
                    }

                    if (newItems.length === 0) {
                        alert('No valid items found in CSV');
                        return;
                    }

                    const updatedInventory = [...inventory, ...newItems];
                    setInventory(updatedInventory);
                    localStorage.setItem('aubo-inventory', JSON.stringify(updatedInventory));

                    alert(`Successfully imported ${newItems.length} items`);
                    setImportText('');
                    setShowImportModal(false);
                } catch (error) {
                    alert('Error importing CSV. Please check the format and try again.');
                    console.error(error);
                }
            };

            const resetDemo = () => {
                const mockData = generateMockData();
                setInventory(mockData);
                setActivityLog([]);
                localStorage.setItem('aubo-inventory', JSON.stringify(mockData));
                localStorage.setItem('aubo-activity-log', JSON.stringify([]));
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 p-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
                            <div className="flex items-center justify-between mb-4 flex-wrap gap-4">
                                <div>
                                    <h1 className="text-3xl font-bold text-slate-900">AUBO Inventory System</h1>
                                    <p className="text-slate-600 mt-1">Real-time inventory tracking and management</p>
                                </div>
                                <div className="flex gap-2 flex-wrap">
                                    <button onClick={() => setShowAddModal(true)} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                                        <Plus size={18} />
                                        Add Item
                                    </button>
                                    <button onClick={() => setShowImportModal(true)} className="flex items-center gap-2 px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">
                                        <Upload size={18} />
                                        Import CSV
                                    </button>
                                    <button onClick={exportData} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                                        <Download size={18} />
                                        Export CSV
                                    </button>
                                    <button onClick={resetDemo} className="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 transition">
                                        Reset Demo
                                    </button>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">
                                <div className="bg-blue-50 p-4 rounded-lg">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-sm text-blue-600 font-medium">Total Items</p>
                                            <p className="text-2xl font-bold text-blue-900">{inventory.length}</p>
                                        </div>
                                        <Package size={32} className="text-blue-400" />
                                    </div>
                                </div>
                                <div className="bg-red-50 p-4 rounded-lg">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-sm text-red-600 font-medium">Low Stock Alerts</p>
                                            <p className="text-2xl font-bold text-red-900">{lowStockCount}</p>
                                        </div>
                                        <AlertTriangle size={32} className="text-red-400" />
                                    </div>
                                </div>
                                <div className="bg-green-50 p-4 rounded-lg">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-sm text-green-600 font-medium">Categories</p>
                                            <p className="text-2xl font-bold text-green-900">{categories.length - 1}</p>
                                        </div>
                                        <TrendingDown size={32} className="text-green-400" />
                                    </div>
                                </div>
                                <div className="bg-purple-50 p-4 rounded-lg">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <p className="text-sm text-purple-600 font-medium">Recent Updates</p>
                                            <p className="text-2xl font-bold text-purple-900">{activityLog.length}</p>
                                        </div>
                                        <History size={32} className="text-purple-400" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm p-6 mb-6">
                            <div className="flex flex-col md:flex-row gap-4">
                                <div className="flex-1 relative">
                                    <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400" size={20} />
                                    <input
                                        type="text"
                                        placeholder="Search by ID, name, or keywords (try 'mb', 'interface', 'gen1')..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    />
                                </div>
                                <select
                                    value={selectedCategory}
                                    onChange={(e) => setSelectedCategory(e.target.value)}
                                    className="px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                >
                                    {categories.map(cat => (
                                        <option key={cat} value={cat}>{cat}</option>
                                    ))}
                                </select>
                                <button
                                    onClick={() => setShowLowStock(!showLowStock)}
                                    className={`px-6 py-3 rounded-lg font-medium transition whitespace-nowrap ${
                                        showLowStock 
                                            ? 'bg-red-600 text-white' 
                                            : 'bg-slate-200 text-slate-700 hover:bg-slate-300'
                                    }`}
                                >
                                    {showLowStock ? 'Show All' : 'Low Stock Only'}
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm overflow-hidden mb-6">
                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ID</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Name</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Category</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Quantity</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Location</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Status</th>
                                            <th className="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        {filteredInventory.map(item => {
                                            const isLowStock = item.quantity < item.minStock;
                                            const stockPercentage = (item.quantity / item.minStock) * 100;
                                            
                                            return (
                                                <tr key={item.id} className={isLowStock ? 'bg-red-50' : 'hover:bg-slate-50'}>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{item.id}</td>
                                                    <td className="px-6 py-4 text-sm text-slate-900">
                                                        <div>{item.name}</div>
                                                        <div className="text-xs text-slate-500">{item.notes}</div>
                                                    </td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{item.category}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap">
                                                        <div className="text-sm font-semibold text-slate-900">{item.quantity}</div>
                                                        <div className="text-xs text-slate-500">Min: {item.minStock}</div>
                                                    </td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{item.location}</td>
                                                    <td className="px-6 py-4 whitespace-nowrap">
                                                        {isLowStock ? (
                                                            <span className="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">
                                                                <AlertTriangle size={12} />
                                                                Low Stock
                                                            </span>
                                                        ) : stockPercentage < 150 ? (
                                                            <span className="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                                                                Adequate
                                                            </span>
                                                        ) : (
                                                            <span className="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                                Good Stock
                                                            </span>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                        <div className="flex gap-2">
                                                            <button
                                                                onClick={() => {
                                                                    setSelectedItem(item);
                                                                    setShowUpdateModal(true);
                                                                }}
                                                                className="text-blue-600 hover:text-blue-800 font-medium"
                                                            >
                                                                Update
                                                            </button>
                                                            <button
                                                                onClick={() => handleDeleteItem(item)}
                                                                className="text-red-600 hover:text-red-800 font-medium"
                                                            >
                                                                <Trash2 size={16} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                            {filteredInventory.length === 0 && (
                                <div className="text-center py-12 text-slate-500">
                                    No items found matching your search criteria
                                </div>
                            )}
                        </div>

                        <div className="bg-white rounded-lg shadow-sm p-6">
                            <h2 className="text-xl font-bold text-slate-900 mb-4 flex items-center gap-2">
                                <History size={24} />
                                Recent Activity
                            </h2>
                            <div className="space-y-2 max-h-64 overflow-y-auto">
                                {activityLog.length === 0 ? (
                                    <p className="text-slate-500 text-sm">No activity yet. Update inventory to see changes tracked here.</p>
                                ) : (
                                    activityLog.map((log, idx) => (
                                        <div key={idx} className="border-l-4 border-blue-400 pl-4 py-2 bg-slate-50 rounded">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <p className="text-sm font-medium text-slate-900">
                                                        {log.itemName} ({log.itemId})
                                                    </p>
                                                    <p className="text-sm text-slate-600">{log.action}: {log.details}</p>
                                                </div>
                                                <span className="text-xs text-slate-500">
                                                    {new Date(log.timestamp).toLocaleString()}
                                                </span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {showAddModal && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-lg p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-bold text-slate-900">Add New Item</h3>
                                        <button onClick={() => setShowAddModal(false)} className="text-slate-500 hover:text-slate-700">
                                            <X size={24} />
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">ID *</label>
                                            <input
                                                type="text"
                                                value={newItem.id}
                                                onChange={(e) => setNewItem({...newItem, id: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., R004"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Name *</label>
                                            <input
                                                type="text"
                                                value={newItem.name}
                                                onChange={(e) => setNewItem({...newItem, name: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., AUBO-i7 Robot"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Category *</label>
                                            <input
                                                type="text"
                                                value={newItem.category}
                                                onChange={(e) => setNewItem({...newItem, category: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., Robots, Spare Parts"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Location</label>
                                            <input
                                                type="text"
                                                value={newItem.location}
                                                onChange={(e) => setNewItem({...newItem, location: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., Warehouse A"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Quantity *</label>
                                            <input
                                                type="number"
                                                min="0"
                                                value={newItem.quantity}
                                                onChange={(e) => setNewItem({...newItem, quantity: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., 10"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Min Stock *</label>
                                            <input
                                                type="number"
                                                min="0"
                                                value={newItem.minStock}
                                                onChange={(e) => setNewItem({...newItem, minStock: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., 5"
                                            />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Notes</label>
                                            <textarea
                                                value={newItem.notes}
                                                onChange={(e) => setNewItem({...newItem, notes: e.target.value})}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                rows="2"
                                                placeholder="e.g., Latest model with enhanced features"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-3 mt-6">
                                        <button
                                            onClick={handleAddItem}
                                            className="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition"
                                        >
                                            Add Item
                                        </button>
                                        <button
                                            onClick={() => {
                                                setShowAddModal(false);
                                                setNewItem({ id: '', name: '', category: '', quantity: '', minStock: '', location: '', notes: '' });
                                            }}
                                            className="flex-1 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showImportModal && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-lg p-6 max-w-2xl w-full">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-xl font-bold text-slate-900">Import CSV Data</h3>
                                        <button onClick={() => setShowImportModal(false)} className="text-slate-500 hover:text-slate-700">
                                            <X size={24} />
                                        </button>
                                    </div>
                                    <div className="mb-4">
                                        <p className="text-sm text-slate-600 mb-2">
                                            Paste your CSV data below. Required columns: ID, Name, Category, Quantity, Min Stock
                                        </p>
                                        <p className="text-xs text-slate-500 mb-3">
                                            Example format:<br/>
                                            ID,Name,Category,Quantity,Min Stock,Location,Last Updated,Notes<br/>
                                            R004,AUBO-i7 Robot,Robots,5,3,Warehouse C,2026-01-18,New model
                                        </p>
                                        <textarea
                                            value={importText}
                                            onChange={(e) => setImportText(e.target.value)}
                                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                                            rows="10"
                                            placeholder="Paste CSV data here..."
                                        />
                                    </div>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={handleImport}
                                            disabled={!importText.trim()}
                                            className="flex-1 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 disabled:bg-slate-300 disabled:cursor-not-allowed transition"
                                        >
                                            Import Data
                                        </button>
                                        <button
                                            onClick={() => {
                                                setShowImportModal(false);
                                                setImportText('');
                                            }}
                                            className="flex-1 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showUpdateModal && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-lg p-6 max-w-md w-full">
                                    <h3 className="text-xl font-bold text-slate-900 mb-4">Update Inventory</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Item</label>
                                            <p className="text-sm text-slate-900">{selectedItem?.name} ({selectedItem?.id})</p>
                                            <p className="text-xs text-slate-500">Current quantity: {selectedItem?.quantity}</p>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Action</label>
                                            <select
                                                value={updateAction}
                                                onChange={(e) => setUpdateAction(e.target.value)}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                            >
                                                <option value="received">Received (Add to inventory)</option>
                                                <option value="shipped">Shipped (Remove from inventory)</option>
                                                <option value="allocated">Allocated to Project (Remove from inventory)</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Quantity</label>
                                            <input
                                                type="number"
                                                min="1"
                                                value={updateQuantity}
                                                onChange={(e) => setUpdateQuantity(e.target.value)}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="Enter quantity"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Notes (Optional)</label>
                                            <input
                                                type="text"
                                                value={updateNotes}
                                                onChange={(e) => setUpdateNotes(e.target.value)}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                placeholder="e.g., Project X, Customer Y"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-3 mt-6">
                                        <button
                                            onClick={handleUpdateSubmit}
                                            disabled={!updateQuantity || updateQuantity <= 0}
                                            className="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed transition"
                                        >
                                            Confirm Update
                                        </button>
                                        <button
                                            onClick={() => {
                                                setShowUpdateModal(false);
                                                setSelectedItem(null);
                                                setUpdateQuantity('');
                                                setUpdateNotes('');
                                            }}
                                            className="flex-1 bg-slate-200 text-slate-700 px-4 py-2 rounded-lg hover:bg-slate-300 transition"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InventorySystem />);
    </script>
</body>
</html>
